

services:

  postgres:
    image: postgres:16-alpine
    container_name: oap-postgres
    environment:
      POSTGRES_DB:       orderandpay
      POSTGRES_USER:     orderandpay
      POSTGRES_PASSWORD: orderandpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderandpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oap-backend
    ports:
      - "8090:8080"
    environment:
      DB_USER:        orderandpay
      DB_PASSWORD:    orderandpay
      JWT_SECRET:     change-me-in-production-256-bit-secret
      FRONTEND_URL:   http://localhost:4200
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderandpay
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: oap-admin
    ports:
      - "4201:80"
    depends_on:
      - backend

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: oap-mobile
    ports:
      - "8101:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
