spring:
  application:
    name: order-and-pay

  datasource:
    url: jdbc:postgresql://localhost:5432/orderandpay
    username: ${DB_USER:orderandpay}
    password: ${DB_PASSWORD:orderandpay}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: 8080
  servlet:
    context-path: /api

app:
  uploads:
    path: ${UPLOADS_PATH:./uploads}

  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
    expiration-ms: 86400000        # 24h
    refresh-expiration-ms: 604800000  # 7j

  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8100
      - ${FRONTEND_URL:https://app.orderandpay.io}

  websocket:
    endpoint: /ws
    allowed-origins: "*"

logging:
  level:
    com.orderandpay: DEBUG
    org.springframework.security: INFO
